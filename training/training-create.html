<!-- Nueva capacitación - móvil minimal -->
<div class="p-4 space-y-4" aria-label="Nueva capacitación móvil">
  <h2 class="text-lg font-semibold">Nueva Capacitación</h2>
  <form class="space-y-3">
    <div>
      <label class="block text-sm">Título</label>
      <input class="w-full border rounded px-3 py-2" placeholder="Ej. Inducción seguridad" />
    </div>
    <div>
      <label class="block text-sm">Fecha</label>
      <input type="date" class="w-full border rounded px-3 py-2" />
    </div>
    <div>
      <label class="block text-sm">Duración (min)</label>
      <input type="number" class="w-full border rounded px-3 py-2" />
    </div>
    <div class="flex items-center justify-between">
      <button type="button" class="px-4 py-2 bg-stone-200 rounded">Cancelar</button>
      <button type="button" class="px-4 py-2 bg-brand-600 text-white rounded">Guardar</button>
    </div>
  </form>
</div>
