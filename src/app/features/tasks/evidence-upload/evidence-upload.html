<!-- Zona de drop -->
<div
  class="relative border-2 border-dashed rounded-xl p-5 text-center transition-all"
  [class.border-brand-400]="dragOver()"
  [class.bg-brand-50]="dragOver()"
  [class.border-stone-300]="!dragOver()"
  [class.bg-stone-50]="!dragOver()"
  (dragover)="onDragOver($event)"
  (dragleave)="onDragLeave()"
  (drop)="onDrop($event)"
>

  <!-- Icono -->
  <div class="flex justify-center mb-3">
    @if (type() === 'IMAGE') {
      <div class="w-10 h-10 bg-brand-100 rounded-xl flex items-center justify-center">
        <svg class="w-5 h-5 text-brand-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
        </svg>
      </div>
    } @else {
      <div class="w-10 h-10 bg-brand-100 rounded-xl flex items-center justify-center">
        <svg class="w-5 h-5 text-brand-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M15 10l4.553-2.276A1 1 0 0121 8.723v6.554a1 1 0 01-1.447.894L15 14M5 18h8a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z" />
        </svg>
      </div>
    }
  </div>

  <!-- Texto -->
  <p class="text-stone-700 text-sm font-medium mb-0.5">
    Subir {{ label() }}
  </p>
  <p class="text-stone-400 text-xs mb-3">
    {{ formatsLabel() }} · {{ maxSizeLabel() }}
  </p>

  <!-- Spinner o botón -->
  @if (uploading()) {
    <div class="flex items-center justify-center gap-2 text-brand-600">
      <svg class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z" />
      </svg>
      <span class="text-sm font-medium">Subiendo…</span>
    </div>
  } @else {
    <label class="inline-flex items-center gap-1.5 px-4 py-2 bg-white border border-stone-300 hover:border-brand-400 hover:text-brand-600 text-stone-700 text-sm font-medium rounded-lg cursor-pointer transition-colors shadow-sm">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
      </svg>
      Seleccionar archivo
      <input
        type="file"
        [accept]="accept()"
        class="sr-only"
        (change)="onFileSelected($event)"
      />
    </label>
  }

  <!-- Error -->
  @if (uploadError()) {
    <p class="mt-3 text-red-600 text-xs font-medium">
      {{ uploadError() }}
    </p>
  }

</div>
