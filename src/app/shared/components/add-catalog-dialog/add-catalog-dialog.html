@if (isOpen()) {
  <!-- Backdrop -->
  <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40"
       (click)="close()">

    <!-- Card -->
    <div class="bg-white rounded-xl shadow-card-md w-full max-w-md mx-4 p-6"
         (click)="$event.stopPropagation()">

      <!-- Título -->
      <h2 class="text-lg font-bold text-stone-900 mb-4">
        Agregar {{ catalogType() }}
      </h2>

      <!-- Formulario -->
      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-4">

        <div>
          <label class="block text-sm font-medium text-stone-700 mb-1">Valor *</label>
          <input formControlName="value" type="text"
                 [placeholder]="'Ej. Nuevo ' + catalogType()"
                 class="w-full border border-stone-200 rounded-lg px-3 py-2 text-sm text-stone-900 focus:outline-none focus:ring-2 focus:ring-brand-500">
          @if (form.get('value')?.invalid && form.get('value')?.touched) {
            <p class="text-xs text-red-600 mt-1">El valor es obligatorio</p>
          }
        </div>

        <!-- Error -->
        @if (errorMsg()) {
          <div class="p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm">
            {{ errorMsg() }}
          </div>
        }

        <!-- Acciones -->
        <div class="flex justify-end gap-3 pt-2">
          <button type="button"
                  (click)="close()"
                  class="px-4 py-2 text-sm font-medium text-stone-600 border border-stone-200 rounded-lg hover:bg-stone-50 transition-colors">
            Cancelar
          </button>
          <button type="submit"
                  [disabled]="form.invalid || saving()"
                  class="px-4 py-2 text-sm font-medium text-white bg-brand-600 rounded-lg hover:bg-brand-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
            @if (saving()) {
              <span class="inline-flex items-center gap-2">
                <svg class="animate-spin h-4 w-4" fill="none" viewBox="0 0 24 24">
                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
                </svg>
                Guardando...
              </span>
            } @else {
              Guardar
            }
          </button>
        </div>
      </form>
    </div>
  </div>
}
