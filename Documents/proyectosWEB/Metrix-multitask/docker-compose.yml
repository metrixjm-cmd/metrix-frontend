services:
  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  backend:
    build: ./backend-api
    ports:
      - "8080:8080"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/metrix_db
      METRIX_ANALYTICS_URL: http://analytics:8080/api/v1/analytics
      METRIX_SECURITY_JWT_SECRET_KEY: ${METRIX_SECURITY_JWT_SECRET_KEY:?JWT secret required - set in .env}
      METRIX_API_KEY: ${METRIX_API_KEY:-dev-internal-key}
      CORS_ALLOWED_ORIGINS: http://localhost:4200,http://localhost:8080
      SPRING_PROFILES_ACTIVE: docker
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      METRIX_REDIS_ENABLED: "true"
      LOG_LEVEL_MONGO: WARN
      LOG_LEVEL_REDIS: WARN
      LOG_LEVEL_APP: INFO
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped

  analytics:
    build: ./analytics-service
    ports:
      - "8001:8080"
    environment:
      MONGODB_URL: mongodb://mongodb:27017
      MONGODB_DB_NAME: metrix_db
      METRIX_API_KEY: ${METRIX_API_KEY:-dev-internal-key}
      REDIS_URL: redis://redis:6379
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  frontend:
    build: ./frontend-web
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  mongo_data:
  redis_data:
