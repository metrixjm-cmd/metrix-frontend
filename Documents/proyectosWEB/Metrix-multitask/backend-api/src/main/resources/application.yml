server:
  port: 8080
  shutdown: graceful

spring:
  application:
    name: METRIX-API

  # MongoDB
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/metrix_db}
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: ${REDIS_TIMEOUT:3000}

  # Archivos
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  lifecycle:
    timeout-per-shutdown-phase: 15s

# Configuración personalizada de METRIX
metrix:
  google-cloud:
    bucket-name: ${GCS_BUCKET_NAME:metrix-evidences}
    project-id: ${GCS_PROJECT_ID:metrix-project-id}
    credentials-path: ${GCS_CREDENTIALS_PATH:classpath:gcp-service-account.json}

  security:
    jwt:
      secret-key: ${METRIX_SECURITY_JWT_SECRET_KEY}
      expiration-ms: ${JWT_EXPIRATION_MS:86400000}

  analytics:
    url: ${METRIX_ANALYTICS_URL:http://localhost:8001/api/v1/analytics}
    api-key: ${METRIX_API_KEY:dev-internal-key}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:8080}

  # Redis — false para dev local sin Redis, true para prod con Memorystore/Docker
  redis:
    enabled: ${METRIX_REDIS_ENABLED:false}

# Logging
logging:
  level:
    root: INFO
    org.springframework.data.mongodb: ${LOG_LEVEL_MONGO:DEBUG}
    org.springframework.data.redis: ${LOG_LEVEL_REDIS:WARN}
    com.metrix.api: ${LOG_LEVEL_APP:DEBUG}
