# Cloud Build — METRIX Backend (Spring Boot → Cloud Run)
#
# Substitutions esperadas (en Cloud Build trigger o manualmente):
#   _REGION          : us-central1
#   _BACKEND_SERVICE : metrix-backend
#   _REGISTRY        : us-central1-docker.pkg.dev
#   _REPO            : metrix
#   _MONGO_URI       : secret ref o valor directo (Atlas URI)
#   _JWT_SECRET      : secret ref o valor directo
#   _ANALYTICS_URL   : URL del servicio metrix-analytics ya desplegado
#   _CORS_ORIGINS    : URL del frontend Firebase (ej. https://mi-proyecto.web.app)

substitutions:
  _REGION:          us-central1
  _BACKEND_SERVICE: metrix-backend
  _REGISTRY:        us-central1-docker.pkg.dev
  _REPO:            metrix

steps:
  # 1. Build Docker image
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGISTRY}/$PROJECT_ID/${_REPO}/backend:$COMMIT_SHA
      - -t
      - ${_REGISTRY}/$PROJECT_ID/${_REPO}/backend:latest
      - ./backend-api
    id: build-backend

  # 2. Push a Artifact Registry
  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGISTRY}/$PROJECT_ID/${_REPO}/backend
    id: push-backend
    waitFor: [build-backend]

  # 3. Deploy a Cloud Run
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_BACKEND_SERVICE}
      - --image=${_REGISTRY}/$PROJECT_ID/${_REPO}/backend:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=5
      - --set-env-vars=SPRING_DATA_MONGODB_URI=${_MONGO_URI},METRIX_SECURITY_JWT_SECRET_KEY=${_JWT_SECRET},METRIX_ANALYTICS_URL=${_ANALYTICS_URL},CORS_ALLOWED_ORIGINS=${_CORS_ORIGINS},SPRING_PROFILES_ACTIVE=docker
    id: deploy-backend
    waitFor: [push-backend]

images:
  - ${_REGISTRY}/$PROJECT_ID/${_REPO}/backend:$COMMIT_SHA
  - ${_REGISTRY}/$PROJECT_ID/${_REPO}/backend:latest

timeout: 1200s
