name: Deploy Frontend to Firebase Hosting

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Clear Angular cache
        run: npx ng cache clean || true

      - name: Build production
        run: npx ng build --configuration=production

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting (metrix-app)
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GCP_SA_KEY }}
          FIREBASE_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          echo $GOOGLE_APPLICATION_CREDENTIALS_JSON > /tmp/sa-key.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json
          npx firebase-tools deploy --only hosting:metrix-app --project $FIREBASE_PROJECT --force --non-interactive
