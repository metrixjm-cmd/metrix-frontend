name: Deploy Frontend to Firebase Hosting

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Show environment files at build time
        run: |
          echo "=== environment.ts ==="
          cat src/environments/environment.ts
          echo "=== environment.prod.ts ==="
          cat src/environments/environment.prod.ts

      - name: Clear Angular cache
        run: npx ng cache clean || true

      - name: Build production
        run: npx ng build --configuration=production

      - name: Show built environment chunk
        run: |
          echo "=== Built JS chunks ==="
          ls dist/metrix-app/browser/chunk-*.js
          echo "=== Searching for apiUrl in chunks ==="
          grep -r "apiUrl\|localhost\|metrix-backend\|8080" dist/metrix-app/browser/chunk-*.js | head -10 || echo "URL not found in chunks"
          echo "=== Searching in main bundle ==="
          grep -o "apiUrl[^\"']*[\"'][^\"']*[\"']" dist/metrix-app/browser/main-*.js | head -5 || echo "URL not found in main bundle"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GCP_SA_KEY }}
          FIREBASE_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          echo $GOOGLE_APPLICATION_CREDENTIALS_JSON > /tmp/sa-key.json
          export GOOGLE_APPLICATION_CREDENTIALS=/tmp/sa-key.json
          npx firebase-tools deploy --only hosting --project $FIREBASE_PROJECT --force --non-interactive
